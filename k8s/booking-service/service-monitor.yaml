apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: booking-service-monitor
  namespace: gym-app
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: booking-service
  endpoints:
    - port: http
      path: /actuator/metrics
      interval: 15s
  namespaceSelector:
    matchNames:
      - gym-app
