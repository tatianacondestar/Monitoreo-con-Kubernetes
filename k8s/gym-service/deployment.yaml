apiVersion: apps/v1
kind: Deployment
metadata:
  name: gym-service
  namespace: gym-app
  labels:
    app: gym-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gym-service
  template:
    metadata:
      labels:
        app: gym-service
    spec:
      containers:
        - name: gym-service
          image: gym-service:1.0.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_APPLICATION_NAME
              value: "gym-service"
            - name: ARTIFICIAL_DELAY_MS
              value: "0"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
